.hero {
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1552566626-52f8b828add9") no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;

}

.content {
  position: relative;
  text-align: center;
  max-width: 600px;
}

h1 {
  font-size: 48px;
  margin-bottom: 20px;
}

p {
  color: #ccc;
  margin-bottom: 20px;
}

.btn {
  padding: 12px 24px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.primary {
  background: white;
  color: black;
}

.outline {
  background: transparent;
  border: 1px solid white;
  color: white;
}
